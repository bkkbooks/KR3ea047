front:
  text: 自序素問自天元紀以下七篇皆言五運六氣天時民病同異生化之原正反逆從之治而先於六節臟象篇發其端凡在天人氣交之病非此不能知也夫治病不外乎五行五行又不外乎陰陽而言五行者不知言合化之五行言陰陽者又不知言過不及之陰陽則陰陽非此陰陽五行亦非此五行矣況並陰陽五行之不言烏知所謂氣交者哉爰就內經之言運氣者首列經文民病於上即以氣交之旨隱括而疏通之並以宋人陳無擇三因十六方國朝江陰繆問芳遠氏十六方解附焉或有疑而詰之者曰人病之來也何有常而子獨以運氣為言豈能於人身之病定相合耶然而余之意本不為是也經曰善言天者必應於人善言古者必驗於今人身一小天地天地之生長收藏備於人身人身之盛衰虛實同於天地論司天固足以明天道即不論司天而人在氣交之中即因氣交而為病於古如是於今如是即仲景論傷寒所以撰用素問者亦無不如是蓋非是則不知病之所以為治並不知人之所以為病乃自有馬元素程德齋之徒索隱行怪流入異端而人不解內經大義遂繼之以不信於是而凡六經之病之生於氣交者無人能道曷怪其謂內經運氣若無與於六經病而且謂仲景之論亦無與於內經運氣乎故莫若揭此七篇病因治法以求六經病所由來而六經之何由而病病之何由而治即可以內經之言明仲景之法並可以知今人之病無一不出於內經之言此天元紀以下七篇所以不可廢也豈必拘泥乎運氣哉是編也余於同治乙丙歲來往吳淞峰泖間所作藏之篋衍二十年矣今命子潤庠重加編次將以授諸梓人乃自述其作書之意如此光緒十年甲申人日陸懋修書於邸舍之雙娛堂
