body:
  text: 辨言吾友陸九芝封公為鳳石中盾尊人鳳石供奉內廷君就養京邸生平以著述自娛而尤邃於醫學嘗語余曰淮南子有言所以貴扁鵲者知病之所從生也所以貴聖人者知亂之所由起也此以治病喻已亂與內經之以已亂喻治病者意別而所以知病所從生則盡在天元紀七篇陰陽五行中自醫者不讀此七篇而百病之始生皆不知其所自此余內經病釋所由獨舉此七篇而作也夫病之生也豈能外陰陽五行之理故即內經他篇所言病亦無不可由此以推君所釋雖止七篇直不啻通一部內經而盡釋之厥功偉矣若以為此七篇者本言運氣即謂此書專為運氣發是豈君志哉君與余同里閈回首少年名場角逐忽忽若前日事今者見君書之成非第為病者幸實當為斯道幸也君書凡三十三卷皆醫學中不可少之作此尤其蚤歲所獨得而今亦不肯終祕焉因乞一言以辨簡端時余奉命視學兩浙行有日矣倚裝書此願以告後之讀君書者光緒十年甲申春三月吳劉廷枚內經運氣病釋一六節臟象論篇天以六六之節以成一歲此言日六竟而周甲甲六復而終歲三百六十日法也五日謂之候三候謂之氣六氣謂之時四時謂之歲此言一歲之日各從五行之氣而主治也五運相襲而皆治之終期之日周而復始時立氣布如環無端故曰不知年之所加氣之盛衰虛實不可以為工矣此言五運統歲歲立四時時布六氣工不可不知也太過不及各有所勝求其至也皆歸始春此言春為四時之長故凡候氣者皆當始於立春日也未至而至此為太過則薄所不勝而乘所勝也至而不至此為不及則所勝妄行而所生受病所不勝薄之也此言民病之所由作也天食人以五氣地食人以五味此言治法之所由出也天元紀大論篇天有五行御五位以生寒暑燥濕風人有五臟化五氣以生喜怒思憂恐此言人之五臟本於天之五行也神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水此言在天為氣即在地成形上下相召而損益彰也甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之此言天之十干以合化而成五運也子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰此言地之十二支以正化對化而成六氣也厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之此言三陰三陽之本是為六元亦即所謂天元也五運行大論篇氣有餘則制己所勝而侮所不勝其不及則己所不勝侮而乘之己所勝輕而侮之侮反受邪侮而受邪寡於畏也此言己不務德或所勝妄行有勝必有復復則己反受邪亦民病所由作而治法所從出也六微旨大論篇亢則害承乃制制則生化此言亢必受制而亦非制不生也病如是治亦如是言天者求之本言地者求之位言人者求之氣交氣交之中人之居也氣交之分人氣從之萬物由之此言民病在於氣交治亦當於氣交求之工不可不知也氣交變大論篇歲土太過雨濕流行腎水受邪此言六甲陽年太宮運土勝水水受克水之子木來復也民病腹痛清厥意不樂體重煩冤此土邪傷腎既脾志不舒而心腎亦不交也甚則肌肉萎足痿不收行善瘈腳下痛此土邪有餘脾經自病發為痿痹也脾司肌肉者也飲發中滿食減四肢不舉此土氣太過而水氣不行也飲痰飲也腹滿溏泄腸鳴此土盛水衰水氣伏而土氣獨行也反下甚此水為土克而水之子木以風氣復之也木復而土病始則有餘而侮繼則侮反受邪故土自病而利不止太溪絶者不治此腎脈也土亢則腎氣絶敦阜之紀有之歲土不及風乃盛行化氣不令此言六己陰年少宮運土不及木勝土土之子金來復也民病飧泄霍亂體重腹痛筋骨繇復肌肉瞤酸善怒此土不及而木乘之皆脾弱肝強之病也咸病寒中此土氣不及寒水無畏水氣獨行而火土並衰也惟己巳己亥年相火在泉民得無病復則胸脅暴痛下引少腹善太息此土衰木亢而土之子金以燥氣復之肝膽同病也土不足不生金金失蔭亦來復後凡不及之年皆仿此氣客於脾食少失味此以土不及則脾不磨谷運化不速也土不及其病內舍心腹外在肌肉四肢此亦土衰之病卑監之紀有之歲金不及炎火乃行生氣乃用長氣專勝此言六乙陰年少商運金不及火勝金金之子水來復也民病肩背瞀重鼽嚏血便注下此金受火邪而金之母土亦病也勝金之火為木火金不及則木寡於畏所勝妄行也木妄行則土受其克所生受病也後皆仿此復則頭腦戶痛延及腦頂發熱口瘡甚則心痛此金衰火亢而金之子水以寒氣復之也寒甚於下則格陽於上金不及其病內舍膺肋肩背外在皮毛此亦金衰之病從革之紀有之歲金太過燥氣流行肝木受邪此言六庚陽年太商運金勝木木受克木之子火來復也民病兩脅下少腹痛目赤痛眥瘍耳無所聞體重胸病引背此金制其所勝之木肝臟既傷而膽腑亦病也甚則喘咳逆氣肩背痛尻陰股膝髀腨䯒足皆病此金燥過甚肺金自病金不生水而水臟亦病也反暴痛胠脅不可反側咳逆甚而血溢此金盛傷肝而木之子火以熱氣復之金反自病也太衝絶者不治此肝脈也金亢則肝氣絶堅成之紀有之歲水太過寒氣流行邪害心火此言六丙陽年太羽運水勝火火受克火之子土來復也民病身熱煩心躁悸陰厥上下中寒譫妄心痛此水盛火衰心臟受邪而神氣內虛也上謂手下謂足甚則腹大脛腫喘咳寢汗出憎風此水邪有餘土不能制水氣妄行腎臟自病也於丙辰丙戌天符之歲尤甚反腹滿腸鳴溏泄食不化渴而妄冒此水邪侮火而火之子土以濕氣復之心氣不舒也神門絶者不治此心脈也水亢則心氣絶流衍之紀有之歲水不及濕乃盛行長氣反用此言六辛陰年少羽運水不及土勝水水之子木來復也民病腹滿身重濡泄寒瘍流水腰股痛發膕腨股膝不便煩冤足痿清厥腳下痛甚則跗腫此土邪傷腎關節不利火鬱而濕亦不行也寒疾於下甚則腹滿浮腫此土濕太過陽光不治而大寒在下腎氣傷也於辛丑辛未寒水在泉之年尤甚復則面色時變筋骨並闢肉瞤瘈目視䀮䀮肌肉疹發氣並鬲中痛於心腹此水衰土亢而水之子木以風氣復之中土亦病也水不及其病內舍腰脊骨髓外在溪谷踹膝此亦水衰之病涸流之紀有之歲木不及燥乃盛行生氣失應此言六丁陰年少角運木不及金勝木木之子火來復也民病中清胠脅痛少腹痛此金邪乘木而肝虛之為病也腸鳴溏泄此清氣在中而木不生火脾之寒也於丁卯丁酉兩年以金遇金尤甚復則病寒熱瘡瘍痱疹癰痤咳而鼽此木衰土亢而木之子火以熱氣復之病在肺之合也木不及其病內舍胠脅外在關節此亦木衰之病委和之紀有之歲木太過風氣流行脾土受邪此言六壬陽年太角運木勝土土受克土之子金來復也民病飧泄食減體重煩冤腸鳴腹支滿此木鬱土中脾土受病而水穀不化也甚則忽忽善怒眩冒巔疾此木勝肝強厥陰之脈隨督脈會於巔而火上逆也反脅痛而吐甚此土為木克而土之子金以燥氣復之也侮反受邪故肝病而膽亦病衝陽絶者不治此胃脈也木亢則胃氣絶發生之紀有之歲火太過炎暑流行金肺受邪此言六戊陽年太徵運火勝金金受克金之子水來復也民病瘧少氣咳喘血溢血泄注下此火乘肺金其性急速而肺與大腸又相表裡故逼血妄行於上下也嗌燥耳聾此水不上升則少陽之火又行身之側也中熱肩背熱此火不下降而燔灼於中且遊行於上也甚則胸中痛脅支滿兩脅痛膺背肩胛間痛兩臂內痛此皆手心主所行之處火盛故包絡代君受邪而為病也身熱骨痛而為浸淫此火氣浮越於外熱傷皮絡而為浸淫瘡也於子午寅申四戊年上臨君相二火其熱尤甚反譫妄狂越咳喘息鳴下甚血溢泄不止此火盛金衰而金之子水以寒氣復之也復則心反受邪故諸病同於首條而加甚太淵絶者不治此肺脈也火亢則肺氣絶赫曦之紀有之歲火不及寒乃盛行長政不用此言六癸陰年少徵運火不及水勝火火之子土來復也民病胸中痛脅支滿兩脅痛膺背肩胛間及兩臂內痛此火不足則陰邪盛而心氣傷也六戊歲火太過六癸歲火不及其病相同而一熱一寒即分於徵運之剛柔鬱冒矇昧心痛暴瘖此水制其火心氣寒而不舒也胸腹大脅下與腰背相引而痛甚則屈不能伸髖髀如刖此火虛而水逆陰寒凝滯陽氣不行也復則病鶩溏腹滿食飲不下寒中腸鳴泄注腹痛此火衰水亢而火之子土以濕氣復之反侵水臟而水之為害益甚病在內也暴攣痿痹足不任身此土製其水而水氣不行病在外也火不及其病內舍膺脅外在經絡此亦火衰之病伏明之紀有之凡此氣交所變之病以甲巳乙庚丙辛丁壬戊癸年為序者所以明合化之義而中運五音之太少亦因此而見也內經運氣病釋二五常政大論篇敷和之紀其病裡急支滿此言中運風木之平氣其病宜在筋也肝主筋也凡人當運氣中應有之證得助得制即可無病病亦不甚故曰平氣後凡言平氣者仿此升明之紀其病瞤瘈此言中運二火之平氣其病宜在脈也血脈生於心也備化之紀其病否此言中運濕土之平氣其病宜在肉也脾司肌肉者也審平之紀其病咳此言中運燥金之平氣其病宜在皮毛也皮毛肺之合也靜順之紀其病厥此言中運寒水之平氣其病宜在骨也腎主骨也委和之紀其病動搖注恐又病肢廢癰腫瘡瘍此言中運木不及而從金化金又刑木木生火也伏明之紀其病昏惑悲忘此言中運火不及而從水化心陽為陰所遏也卑監之紀其病留滿否塞又病飧泄此言中運土不及而從木化風又勝之是為腸風也從革之紀其病嚏咳鼽衄此言中運金不及而從火化肺家每有風熱也涸流之紀其病痿厥堅下又病癃閉此言中運水不及而從土化土邪又歸於腎也發生之紀其病怒又病吐利此言中運木太過而又剋土故上吐下瀉也赫曦之紀其病笑瘧瘍血流狂妄目赤又病痓按痓字當作痙此言中運火太過而又剋金故病燥也敦阜之紀其病腹滿四肢不舉此言中運土太過而本經自病脾主四肢也堅成之紀其病喘喝胸憑仰息又其病咳此言中運金太過而本經自病肺為諸氣長故病有聲也流衍之紀其病脹此言中運水太過而長氣不化火不生土也厥陰司天風氣下臨脾氣上從此以巳亥歲半以上風化於天歲半以下火行於地言也民病體重肌肉萎食減口爽此風氣臨下土之所畏故脾氣從而病也食減口爽即損谷則愈之謂目轉耳鳴此言肝膽同見風木之病以上皆天氣所生病也赤沃下此火行於地而見尿血為地氣所生病也少陽在泉其治苦酸按此當云酸苦是年上木則下火風熱交加酸屬木以治其上苦屬火以治其下不兼間味者與司天同也義見後少陰司天熱氣下臨肺氣上從此以子午歲半以上熱化於天歲半以下燥行於地言也民病喘嘔寒熱嚏鼽衄鼻窒甚則瘡瘍燔灼此火氣臨下金之所畏故肺氣從之而逆天氣所生病也脅痛善太息此燥行於地甲木受傷為地氣所生病也陽明在泉其治辛苦甘按此當云苦辛甘是年上火則下金燥熱交結苦屬火以治其上辛屬金以治其下必兼甘者火金之間味也甘屬土為火之子為金之母故能調和於火金之間太陰司天濕氣下臨腎氣上從此以丑未歲半以上濕化於天歲半以下水行於地言也民病胸中不利陰痿氣大衰此濕氣臨下水之所畏故腎氣亦從而不用也反腰脽痛厥逆此以土王之時腎病尤甚轉搖不便皆天氣所生病也心下否痛少腹痛此水行於地心火受制火不生土而時害於食皆地氣所生病也太陽在泉其治淡咸是年上土則下水寒濕內蘊淡屬土即土之薄味以治其上咸屬水為水之正味以治其下水土既平故不兼間味也少陽司天火氣下臨肺氣上從此以寅申歲半以上火化於天歲半以下木行於地言也民病咳嚏鼽衄鼻窒口瘍寒熱胕腫此火氣臨下金之所畏故肺氣亦從而上逆與少陰司天略同皆天氣所生病也心痛胃脘痛厥逆鬲不通此風行於地肝木自王為地氣所生病也厥陰在泉其治酸苦按此當云苦酸是年上火則下木風熱為災苦屬火以治其上酸屬木以治其下木火合德故不兼間味陽明司天燥氣下臨肝氣上從此以卯酉歲半以上燥化於天歲半以下火行於地言也民病脅痛目赤掉振鼓栗筋痿不能久立此燥氣臨下木之所畏故肝氣亦從而上逆也肝竅在目而主風主筋己所勝者輕而侮之皆天氣所生病也小便變寒熱如瘧甚則心痛此熱行於地而病肺心火在陰分鬱而不伸為地氣所生病也少陰在泉其治辛苦甘是年上金則下火燥熱交侵辛屬金以治其上苦屬火以治其下甘味義見前太陽司天寒氣下臨心氣上從此以辰戌歲半以上寒化於天歲半以下土行於地言也民病心熱煩嗌乾善渴鼽嚏喜悲數欠善忘甚則心痛此寒氣臨下火之所畏故心氣從而上逆也水勝為寒火鬱為熱熱氣妄行寒又復之皆天氣所生病也水飲內蓄中滿不食皮𤸷肉苛筋脈不利甚則胕腫身後癰此濕行於地病在肌肉為地氣所生病也以其人𤸷痹久臥故身後上背下臀為此癰瘡太陰在泉其治甘鹹按此當云鹹甘是年上水則下土寒濕相合咸屬水以治其上甘屬土以治其下按此六治者前人亦以六氣之化言之然經文明言其治疑當以治法為言正與後文上取下取內取外取以求其過者合也內經運氣病釋三六元正紀大論篇厥陰司天之政氣化運行後天此言巳亥十年氣後天時而至也按經文先後之説皆就正月朔日寅時言之民熱病行於下風病行於上風燥勝復形於中此以風甚則燥勝而熱復故勝復更作上下之氣相形而見於中也初之氣民病寒於右之下此以燥金加於風木初氣為地左間即天右間之下也上年太陽寒水或未退位故寒病復見於此二之氣民病熱於中此以寒水加於君火故熱為寒鬱即傷寒成溫之候也三之氣民病泣出耳鳴掉眩此以三氣即司天風木用事風火交煽有風必有火也四之氣民病黃疸而為胕腫溽暑濕熱相薄爭於左之上此以少陰暑熱與太陰濕土相爭而為濕熱之病也本年少陰君火在天之左間五之氣寒氣及體此以客濕土主燥金燥濕更勝而為沉陰之病也終之氣其病溫厲此以終氣即司地相火用事相火者畏火也畏火司令時寒氣熱故病溫厲即冬溫而民皆病者也歲宜以辛調上以咸調下畏火之氣無妄犯之此言辛從金化以調上之風木咸從水化以調下之相火然相火易虛易實不比君火之有常調之非易故宜慎也少陰司天之政氣化運行先天此言子午十年氣先天時而至也民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫上此以上火下金火熱而金清故熱病見上清病見下也初之氣民病關節禁固腰脽痛中外瘡瘍此寒水為病而以二之氣炎暑將臨故又病熱也二之氣民病淋目瞑目赤氣鬱於上而熱此為木火相生民氣當和而火鬱亦不能不為病也三之氣民病氣厥心痛寒熱更作咳喘目赤此言三氣即司天君火用事二火交煽故病熱也四之氣民病寒熱嗌乾黃疸鼽衄飲發此以客主氣皆濕土而又承君相二火之後故病濕熱也五之氣民病溫此以陽隨收令惟火沴金時寒氣熱陽邪之勝為病正多也終之氣民病腫於上咳喘甚則血溢病生皮腠內舍於脅下連少腹而作寒中此以終氣即司地燥金用事金性收故五氣之餘火內格金氣清故本氣之新寒又作也歲宜咸以軟之而調其上甚則以苦發之以酸收之而安其下甚則以苦泄之此以咸從水化故能調在上之君火金以酸補故能安在下之燥金甚則以苦發之者上熱甚則非用苦之陽不能發越也以苦泄之者下熱甚則非用苦之陰不能湧泄也同一苦味而有從陽從陰之別即有苦寒苦熱之殊余所以謂藥借病用即由此悟入耳太陰司天之政氣化運行後天此言丑未十年氣後天時而至也民病寒濕腹滿身膹膹胕腫痞逆寒厥拘急此以陰凝於上寒積於下故所病皆寒濕也初之氣民病血溢筋絡拘強關節不利身重筋痿此以客主氣皆風木而太陰以濕土司天風濕相搏風病筋而濕病肉血溢為木火之逆而亦寒濕所郁也二之氣民病溫厲盛行遠近咸若此以客主氣皆君火其氣當和而以濕熱交蒸故作溫厲三之氣民病身重胕腫胸腹滿此以三氣即司天濕土用事而主氣又為畏火故病濕熱四之氣民病腠理熱血暴溢瘧心腹滿熱臚脹甚則胕腫此以客火主濕而熱甚於濕故病加甚五之氣民病皮腠此以客主氣皆燥金故病及肺金之合同類相從也終之氣民病關節禁固腰脽痛此以終氣即司地寒水用事故病見於太陽所經之路歲宜以苦燥之溫之甚者發之泄之此言濕宜於燥寒宜於溫味必用苦者苦從火化正用苦之陽也而及其濕寒既化為熱又必有以發泄之少陽司天之政氣化運行先天此言寅申十年氣先天時而至也民病寒熱外發瘡瘍內為泄滿此火盛於外而寒鬱於中故為外熱內寒之證也往復之作民病寒熱瘧泄聾瞑嘔吐上怫腫色變此以木盛則陽明受傷甲木之氣陵犯胃土故為諸病初之氣溫病乃起其病氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠中瘡按經凡言皮腠瘡瘍者即今人病中斑疹之類此以君火用事於相火司上之年二火合氣故其病溫也二之氣民病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡此以濕土用事於君火主氣之時故為濕熱之病也三之氣民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死此以三氣即司天相火用事客主之火皆熾故熱甚也四之氣民病滿身重此以客燥主濕燥勝而肺自病濕勝而脾自病也五之氣民避寒邪此以水寒金冷示民當知所避也終之氣民病關閉不禁心痛陽氣不藏而咳此以終氣即司地風木用事以風加寒風為陽邪而其氣主乎動也歲宜咸宜辛宜酸滲之泄之漬之發之此言咸從水化能勝火也辛從金化能平木也酸從木化能順木火之性凡風火之相煽尤賴酸以收之也滲之是利小便泄之是通大便漬之發之是解肌出汗經所謂潔淨府去菀陳莝開發腠理皆所以致津液而通氣也陽明司天之政氣化運行後天此言卯酉十年氣後天時而至也民病咳嗌塞寒熱發暴振栗癃閉此皆金燥火熱之病肺與小腸受之也初之氣民病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋此以客氣濕主氣風風為陽邪濕為陰邪風濕相搏脾腎交病也二之氣厲大至民善暴死此以客相火主君火似乎二火合德而以臣位君則大逆也三之氣民病寒熱此以三氣即司天燥金用事以陽盛之時而行大涼之氣故病在皮毛也四之氣民病暴僕振栗譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍瘧寒之疾骨痿血便此以四氣之後為司地君火所主而太陽以寒水臨之水火相逆故心腎同病也五之氣民氣和此以風木用事而得司地君火之溫故也終之氣民病溫此以終氣即司地君火用事以溫加寒民氣當平而溫從火化病則多熱也歲宜以咸以苦以辛汗之清之散之此以咸之從水化者治司地之君火苦之從火化者治司天之燥金辛之從金化者治本氣之不及而火來乘之者於上下求得其平也歲半以下氣過於熱故宜清歲半以上氣過於斂故宜散太陽司天之政氣化運行先天此言辰戌十年氣先天時而至也民病寒濕發肌肉萎足痿不收濡瀉血溢此皆寒濕使然而惟血溢為木火之郁寒甚必化熱也初之氣民乃厲溫病乃作身熱頭痛嘔吐肌腠瘡瘍此以上年終氣君火與本年初氣相火為二火之交重以主氣風木又為風火相薄故見諸病二之氣民病氣鬱中滿此以清燥之氣固結於中而陽郁也陽鬱則必傷其陰也三之氣民病寒反熱中癰疽注下心熱瞀悶不治者死此以三氣即司天寒水用事以寒化火故病寒反熱所以太陽之寒傳入陽明即成溫也不戢則燎原矣四之氣民病大熱少氣肌肉萎足痿注下赤白此為以客勝主濕土受風木之制而陽明反燥也五之氣民乃舒此以歲半之後地氣主之以濕土而得君火之助故也終之氣民乃慘淒反者孕乃死此以終氣即司地太陰用事再加於寒水之位故也歲宜苦以燥之溫之此言凡遇濕土寒水之年濕宜燥之寒宜溫之味必用苦者苦從火化治寒以熱正用苦之陽也太陰歲宜與此略同不言發泄者義已見於前也凡此司天所生之病以巳亥子午丑未寅申卯酉辰戌年為序者所以明厥少太少陽太之六氣而於巳亥起厥之訣亦可推而知也壬子壬午其病支滿按經文於六元正紀中惟子午寅申辰戌載有民病餘三紀無之此以中運太角木太過而剋土也戊子戊午其病上熱血溢此以中運太徵火太過而傷陰也甲子甲午其病中滿身重此以中運太宮土太過而脾自病也庚子庚午其病下清此以中運太商金太過而致燥病也丙子丙午其病寒下此以中運太羽水太過而見寒病也壬寅壬申其病掉眩支脅驚駭此以中運太角木太過而肝為病也戊寅戊申其病上熱鬱血溢血泄心痛此以中運太徵火太過而心為病也甲寅甲申其病體重胕腫痞飲此以中運太宮土太過而脾為病也庚寅庚申其病肩背胸中此以中運太商金太過而肺為病也丙寅丙申其病寒浮腫此以中運太羽水太過而腎為病也壬辰壬戌其病眩掉目瞑此以中運太角木太過而見風病也戊辰戊戌其病熱鬱此以中運太徵火太過而見熱病也甲辰甲戌其病濕下重此以中運太宮土太過而見濕病也庚辰庚戌其病燥背瞀胸滿此以中運太商金太過而見燥病也丙辰丙戌其病大寒留於溪谷此以中運太羽水太過而見寒病也厥陰所至為裡急為支痛為軟戾為脅痛嘔泄此巳亥十年初終六氣之病為病之常也按此以春夏秋冬四時為言少陰所至為瘍疹身熱為驚惑惡寒戰栗譫妄為悲妄衄衊為語笑此子午十年初終六氣之病為病之常也太陰所至為積飲否隔為蓄滿為中滿霍亂吐下為重胕腫此丑未十年初終六氣之病為病之常也少陽所至為嚏嘔瘡瘍為驚躁瞀昧暴病為喉痹耳鳴嘔湧為暴注瞤瘈暴死此寅申十年初終六氣之病為病之常也陽明所至為浮虛為鼽尻陰股膝髀腨䯒足病為皴揭為鼽嚏此卯酉十年初終六氣之病為病之常也太陽所至為屈伸不利為腰痛為寢汗痓為流泄禁止按此條寢汗痓亦當作寢汗痙此辰戌十年初終六氣之病為病之常也木鬱之發此言金勝制木而木鬱之待時而發也民病胃脘當心而痛上支兩脅鬲咽不通食飲不下此木淫土虛之病也甚則耳鳴眩轉目不識人善暴僵仆此風淫而本經自病也木之發其氣無常此言其發無常期也風善行而數變故發亦無定經曰木發無時木鬱達之達暢達也木喜條達凡在表者當疏其經在裡者當疏其臟但使氣得通行皆謂之達火鬱之發此言水勝制火而火鬱之待時而發也民病少氣瘡瘍癰腫脅腹胸背面首四肢䐜憤臚脹瘍痱嘔逆此火濕之上衝於肺胃也瘈瘲骨痛節乃有動此火濕之內淫於筋骨也注下溫瘧腹中暴痛血溢流注精液乃少此火濕下上流行經絡受傷而動血耗精也目赤心熱甚則瞀悶懊憹善暴死此肝心二經之火濕並行於內而其性急速也刻終大溫汗濡元府此即火欲發之徵也凡一氣主六十日八十七刻半火之發在四氣則三氣刻數將終即有大溫之候火之發其氣四四之氣為太陰火鬱之發獨在濕土王時故其氣必兼乎濕也火鬱發之發發越也凡火之所居其有結聚斂伏者不宜蔽遏故當因其勢而解散之升揚之也凡病於陽虛陽盛二者之外另有陽為陰遏之證皆當用升陽散火之法即此之謂土鬱之發此言木勝制土而土鬱之待時而發也民病心腹脹腸鳴而為數後此濕行於上中下三焦必治其中而上下始安也甚則心痛脅䐜此心為濕乘肝為侮也嘔吐霍亂此濕上下行而或嘔或吐或吐利交作病每見於中也飲發注下胕腫身重此水飲發而大便暴泄脾傷而肌肉見病皆土發濕邪之證也土之發也以其四氣四氣為土之王時故土之發也以四氣土鬱奪之奪直取也土畏滯凡滯在上者可吐滯在下者可瀉而皆不外直取其中以安其上下也金鬱之發此言火勝制金而金鬱之待時而發也民病咳逆嗌乾面塵色惡此燥氣勝而肺病也心脅滿引少腹善暴痛不可反側此金氣勝而傷肝也金之發也其氣五五氣為陽明王時故其發也以五氣金鬱泄之泄疏利也金鬱之病為咳為閉為燥為寒凡解表利氣通便皆謂之泄水鬱之發此言土勝制水而水鬱之待時而發也民病寒客心痛腰脽痛大關節不利屈伸不便此皆寒水為病於太陽經行之路也善厥逆痞堅腹滿此陰勝而陽氣不伸遂成陽為陰遏之病也水之發也其氣二火前後君火為二之氣相火為三之氣君火之後相火之前六十日之內乃水鬱之所發也水王於冬而發於火令之時陰乘陽也經曰水隨火水鬱折之折抑制也水鬱之病為寒為水其性善流凡養肺金實脾土利膀胱壯命火皆謂之折民病犯寒而不遠寒則寒至寒至則堅否腹滿痛急下利之病生矣此言應遠寒藥而仍用寒則病即因寒藥之誤而甚也民病犯熱而不遠熱則熱至熱至則身熱吐下霍亂癰疽瘡瘍瞀郁注下瞤瘈腫脹嘔鼽衄頭痛骨節變肉痛血溢血泄淋閉之病生矣此言應遠熱藥而仍用熱則病即因熱藥之誤而甚也大積大聚其可犯也衰其大半而止過者死此言積聚之病必當攻之使去而正乃得安特攻之不可過甚耳此正教人以宜攻之病不可畏虛而留病也婦人重身毒之何如有故無殞亦無殞也此言病苟有當去者雖在有娠之婦亦不可畏虛而留病也內經運氣病釋四至真要大論篇厥陰司天風淫所勝此以巳亥歲半以上風化於天而言也民病胃脘當心而痛上支兩脅鬲咽不通飲食不下舌本強食則嘔冷泄腹脹溏泄瘕水閉病本於脾此以肝邪乘脾故諸病皆見於己土也風淫所勝平以辛涼佐以苦甘以甘緩之以酸瀉之此以風為木氣惟金能勝故治以辛涼辛從金化涼為金氣也而過於辛則反傷其氣故佐以苦甘苦以溫金甘以益氣也經曰肝苦急急食甘以緩之又曰以酸瀉之風化於天清反勝之治以酸溫佐以甘苦此以風木之化而反為金之清氣勝之也酸為木之同氣溫以制清也甘以緩肝之急苦以溫金之清厥陰在泉風淫所勝此言寅申歲半以下風司於地為火風之氣也民病灑灑振寒善呻數欠心痛支滿兩脅裡急飲食不下鬲咽不通食則嘔腹脹善噫得後與氣則快然如衰身體皆重此以木邪淫勝而脾胃受傷為病也風淫於內治以辛涼佐以苦甘以甘緩之以辛散之此以金能勝木故治以辛涼然辛勝恐傷其氣故必佐以苦甘苦勝辛甘益氣也經曰肝苦急急食甘以緩之肝欲散急食辛以散之風司於地清反勝之治以酸溫佐以苦甘以辛平之此以木不勝土而反為金氣之清者勝之也以酸之與木同氣者用溫以制金之清即以苦之從火而化者佐甘以緩木之急凡木之正味其補以辛金之正味其瀉以辛故可兩平之少陰司天熱淫所勝此以子午歲半以上熱化於天而言也民病胸中煩熱嗌乾右胠滿皮膚痛寒熱咳喘唾血血泄鼽衄嚏嘔溺色變甚則瘡瘍胕腫肩背臂臑及缺盆中痛心痛肺䐜腹大滿膨膨而喘咳病本於肺此以金受火傷故諸病皆見於肺也熱淫所勝平以鹹寒佐以苦甘以酸收之此以熱為火氣惟水能勝故治以鹹寒咸從水化也其佐苦甘者苦能泄熱甘能瀉火也熱越不斂故以酸收經曰心苦緩急食酸以收之熱化於天寒反勝之治以甘溫佐以苦酸辛此以君火之化而反為水之寒氣所勝也甘能制水熱能制寒故治以甘熱寒得苦而溫亦得辛而散故佐以苦辛火為水勝則心苦緩故宜酸以收之少陰在泉熱淫所勝此言卯酉歲半以下熱司於地為燥火之氣也民病腹中常鳴氣上衝胸喘不能久立寒熱皮膚痛目瞑齒痛䪼腫惡寒發熱如瘧少腹中痛腹大此火氣奔動於中乘肺及胃金水受傷陰陽爭勝而上中下三焦俱病也熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之此以水能制火故治以鹹寒也甘勝咸所以防咸之過苦能泄所以去熱之實也熱越而不能斂則以酸收之熱鬱而不能散則以苦發之熱司於地寒反勝之治以甘熱佐以苦辛以鹹平之此以火不勝金而反為水氣之寒者勝之也甘勝水熱制寒而又佐以苦辛寒得苦而溫亦得辛而散也火之正味其補以咸水之正味其瀉以咸故可兩平之太陰司天濕淫所勝此以丑未歲半以上濕化於天而言也民病胕腫骨痛陰痹陰痹者按之不得腰脊頭項痛時眩大便難陰氣不用飢不欲食咳唾則有血心如懸病本於腎此以水為土克故諸病皆見於腎也濕淫所勝平以苦熱佐以酸辛以苦燥之以淡泄之此以濕為土氣惟燥能勝故治以苦熱酸從木化用以制土而必酸辛並用者辛勝酸所以防酸之過也苦從火化火能助燥經曰脾苦濕急食苦以燥之淡滲者利竅以去濕也濕上甚而熱治以苦溫佐以甘辛以汗為故而止此濕鬱於上而成熱也治以苦溫者欲其燥佐以甘辛者取其汗適復其故即止戒過汗也濕化於天熱反勝之治以苦寒佐以苦酸此以濕土之化而反為火之熱氣勝之也苦寒以祛濕熱苦酸以瀉木火酸為木之正味木位之主其瀉以酸木平則熱亦散矣太陰在泉濕淫所勝此言辰戌歲半以下濕司乾地為寒濕之氣也民病飲積心痛耳聾渾渾焞焞嗌腫喉痹陰病血見少腹痛腫不得小便病沖頭痛目似脫項似拔腰如折髀不可以回膕如結腨如別此以寒濕乘心又土邪淫勝剋水而三焦及腎膀胱俱為水臟故皆病也濕淫於內治以苦熱佐以酸淡以苦燥之以淡泄之此以燥能勝濕故治以苦熱也酸從木化所以制土淡與甘同所以益土故佐以酸淡又必苦燥淡泄者除濕而使濕有去路也濕司於地熱反勝之治以苦冷佐以鹹甘以苦平之此以土不勝水而反為火之熱氣勝之也故以苦冷者抑木火之邪而即佐咸以除已甚之熱甘以補已衰之土平之以苦者苦從火化亦能溫土故可兩平之少陽司天火淫所勝此以寅申歲半以上火化於天而言也民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面胕腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺此金受火邪水不能制故諸病皆見於肺也當與子午年諸病參看火淫所勝平以酸冷佐以苦甘以酸收之以苦發之以酸復之此以火即熱氣惟水能勝與熱淫同故平以酸冷酸能收逆氣寒能勝熱氣也其佐甘苦者甘以緩火之急苦以瀉火之實也火盛則越以酸收之火鬱則伏以苦發之而又必以酸復之者恐發之過而未免傷氣也上文熱淫所勝當參觀之火化於天寒反勝之治以甘熱佐以苦辛此以相火之化而反為水之寒氣勝之也治以甘熱甘能勝水熱能制寒也佐以苦辛寒得苦而溫亦得辛而散也少陽在泉火淫所勝此言巳亥歲半以下火司於地為風火之氣也民病注泄赤白少腹痛溺赤甚則血便此以熱在下焦故氣血兩見傷也余與少陰在泉同候火淫於內治以鹹冷佐以苦辛以酸收之以苦發之此以水氣制火故治以鹹冷與熱淫同苦能泄火辛能散火故以為佐酸收苦發者熱越則斂之熱鬱則散之也火司於地寒反勝之治以甘熱佐以苦辛以鹹平之此以火不勝金而反為水氣之寒者勝之也甘勝水熱勝寒寒得苦而溫得辛而散火之正味其補以咸水之正味其瀉以咸故可兩平之陽明司天燥淫所勝此以卯酉歲半以上燥化於天而言也民病左胠脅痛寒清於中感而瘧咳腹中鳴注泄鶩溏心脅暴痛不可反側嗌乾面塵腰痛丈夫㿗疝婦人少腹痛目昧眥瘍瘡痤癰病本於肝此以木受金傷故諸病皆見於肝也燥淫所勝平以苦溫佐以酸辛以苦下之此以燥為金氣惟火能勝故平以苦溫苦從火化也佐以酸辛者以酸瀉木而補金即以辛瀉金而補木也苦下專指腸胃燥結而言燥化於天熱反勝之治以辛寒佐以苦甘此以燥金之化而反為火之熱氣勝之也辛寒所以泄熱苦甘所以瀉火陽明在泉燥淫所勝此言子午歲半以下燥司於地為火燥之氣也民病喜嘔嘔有苦善太息心脅痛不能反側甚則嗌於面塵身無膏澤足外反熱此以金邪淫勝甲木受傷故所見皆肝膽之病燥淫於內治以苦溫佐以甘辛以苦下之此以苦能降逆故治以苦溫經曰肺苦氣上逆急食苦以泄之是也木受金傷佐以甘緩辛則木補金瀉兩得之矣腸胃燥結非下不可急下之法非苦不可燥司於地熱反勝之治以平寒佐以苦甘以酸平之以和為利此以金不勝木而反為火氣之熱者勝之也燥金之性惡熱而畏寒故用平寒者以瀉火而佐以苦即佐以甘以甘能除大熱也金衰故用酸以補金位之弱即用酸以收浮越之火故可兩平之以和為利者言不可過也太陽司天寒淫所勝此以辰戌歲半以上寒化於天而言也民病血變於中發為癰瘍厥心痛嘔血血泄鼽衄善悲時眩僕胸腹滿手熱肘攣腋腫心淡淡大動胸脅胃脘不寧面赤目黃善噫嗌於甚則色炱渴而欲飲病本於心此寒水勝而邪乘心火受寒傷故諸病皆見於心也寒淫所勝平以辛熱佐以甘苦以咸瀉之此以寒為水氣惟熱能勝熱從火化也然陰病惡燥故必兼以辛潤辛從金化水之母也經曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之用苦補之咸瀉之寒化於天熱反勝之治以鹹冷佐以苦辛此以寒水之化而反為火之熱氣勝之也鹹冷以抑火而又佐苦以泄火辛以散火太陽在泉寒淫所勝此言丑未歲半以下寒司於地為濕寒之氣也民病少腹控睪引腰脊上衝心痛血見嗌痛頷腫此以寒淫於下腎膀胱自傷其類而水邪且上侮火府也寒淫於內治以甘熱佐以苦辛以咸瀉之以辛潤之以苦堅之此以土能勝水熱能勝寒故治以甘熱甘從土化熱從火化也經曰腎苦燥急食辛以潤之腎欲堅急食苦以堅之用苦補之咸瀉之寒司於地熱反勝之治以鹹冷佐以甘辛以苦平之此以水不勝火而反為濕氣之熱者勝之也鹹冷以抑火甘以瀉火辛以散火也苦從火化而又為水之正味故可兩平之內經運氣病釋五至真要大論篇厥陰司天此以巳亥歲半以上客主之氣有勝無復言也客勝則耳鳴掉眩甚則咳此言客初氣燥金勝客二氣寒水勝客三氣風木勝也風勝則耳目病燥勝寒勝皆能致咳主勝則胸脅痛舌難以言此言主時三氣木火勝客也木勝則胸脅痛肝與膽為表裡也火勝則舌難言心開竅於舌也厥陰之客以辛補之以酸瀉之以甘緩之辛補酸瀉與主氣同甘緩者經曰肝苦急急食甘以緩之也木位之主其瀉以酸其補以辛木性升酸則反其性而斂之故曰瀉木喜達辛則助其氣而發之故曰補經曰肝欲散急食辛以散之用辛補之酸瀉之厥陰在泉此以寅申歲半以下客主之氣有勝無復言也客勝則大關節不利內為痙強拘瘈外為不便此言客四氣燥金勝客五氣寒水勝客終氣風木勝也寒勝則太陽經病風燥勝則血不榮筋主勝則筋骨繇並腰腹時痛此言主時土金水三氣勝客也金燥勝則木病故風動而拘急水寒勝則太陽經病土濕勝則太陰經病厥陰之客辛補酸瀉甘緩治與巳亥厥陰司天同木位之主酸瀉辛補治亦同巳亥司天少陰司天此以子午歲半以上客主之氣有勝無復言也客勝則鼽嚏頸項強肩背瞀熱頭痛少氣發熱耳聾目瞑甚則胕腫血溢瘡瘍咳喘此言客初氣寒水勝客二氣風木勝客三氣君火熱勝也寒勝則太陽所經之處皆病而兼見咳喘風勝則聾瞑胕腫熱勝則血溢瘡瘍主勝則心熱煩躁甚則脅痛支滿此言主時三氣木火勝客也火勝則煩躁木勝則脅痛滿少陰之客以咸補之以甘瀉之以酸收之咸補甘瀉與主氣同酸收者經曰心苦緩急食酸以收之也火位之主其瀉以甘其補以咸火性速甘則反其性而緩之故曰瀉火欲軟咸則順其氣而軟之故曰補經曰心欲軟急食鹹以軟之用鹹補之甘瀉之少陰在泉此以卯酉歲半以下客主之氣有勝無復言也客勝則腰痛尻股膝髀腨䯒足病瞀熱以酸胕腫不能久立溲便變此言客四氣寒水勝客五氣風木勝客終氣君火勝也寒勝則太陽經病木勝則筋酸胕腫火勝則溲便為之變以火居陰分也主勝則厥氣上行心痛發熱鬲中衆皆作發於胠脅魄汗不藏四逆而起此言土金水三氣勝客也君火受制於群陰故厥逆痛痹陰汗肢冷為陰氣有餘也少陰之客咸補甘瀉酸收治與子午少陰司天同火位之主甘瀉咸補治亦同子午司天太陰司天此以丑未歲半以上客主之氣有勝無復言也客勝則首面胕腫呼吸氣喘此言客初氣風木勝客二氣火熱勝客三氣濕土勝也皆風濕熱為病主勝則胸腹滿食已而瞀此言主時三氣木火勝客也主客初二氣相和故惟三氣濕土為病太陰之客以甘補之以苦瀉之以甘緩之甘補苦瀉與主氣同甘緩者經曰脾欲緩急食甘以緩之土位之主其瀉以苦其補以甘土性濕苦則反其性而燥之故曰瀉土欲緩甘則順其氣而緩之故曰補經曰脾欲緩急食甘以緩之用苦瀉之甘補之太陰在泉此以辰戌歲半以下客主之氣有勝無復言也客勝則足痿下重便溲不時濕客下焦發而濡瀉及為腫陰曲之疾此言客四氣風木勝客五氣君火勝客終氣濕土勝也風濕熱俱勝故為諸病主勝則寒氣逆滿食飲不下甚則為疝此言主時土金水三氣勝客也金寒水冷客之木火足以敵之故惟見土濕之病太陰之客甘補苦瀉甘緩治與丑未厥陰司天同土位之主苦瀉甘補治亦同丑未司天少陽司天此以寅申歲半以上客主之氣有勝無復言也客勝則丹疹外發及為丹熛瘡瘍嘔逆喉痹頭痛嗌腫耳聾血溢內為瘈瘲此言客初氣君火勝客二氣濕土勝客三氣相火勝也所見皆濕熱病而熱甚於濕主勝則胸滿咳仰息甚而有血手熱此言主時三氣木火勝客也風勝則氣逆熱勝則營傷少陽之客以咸補之以甘瀉之以咸軟之咸補甘瀉與子午少陰司天同咸軟者經曰心欲軟急食鹹以軟之君相皆火故其治同也火位之主甘瀉咸補治亦同子午司天少陽在泉此以巳亥歲半以下客主之氣有勝無復言也客勝則腰腹痛而反惡寒甚則下白溺白此言客四氣君火勝客五氣濕土勝客終氣相火勝也火居陰分濕亦化熱故諸見濕熱之病主勝則熱反上行而客於心心痛發熱格中而嘔少陰同侯此言主時土金水三氣勝客也此與少陰同為陰盛格陽少陽之客咸補甘瀉治與子午少陰司天同咸軟治與寅申少陽司天同火位之主甘瀉咸補治亦同子午司天陽明司天此以卯酉歲半以上客主之氣無勝無復言也清復內余則咳衄嗌塞心鬲中熱咳不止而白血出者死此獨不言客主之勝者以燥金之客加於木火之主金居火位客不勝主而清氣鬱極必發益以木火熱邪充斥肺津大傷白涎白液皆為白血營氣衰而血不及化故主死也三氣即司天之位故清氣有餘與太陽之在泉同陽明在泉此以子午歲半以下客主之氣有勝無復言也客勝則清氣動下少腹堅滿而數便瀉此言客四氣濕土勝客五氣相火勝客終氣燥金勝也濕勝則便泄火勝則便數燥勝則腹堅滿終氣在泉之位故清氣下動主勝則腰重腹痛少腹生寒下為鶩溏則寒厥於腸上衝胸中甚則喘不能久立此言主時土金水三氣勝客也水濕勝則腰重腹痛便溏金勝則下病腸腑上病肺經也陽明之客以酸補之以辛瀉之以苦泄之酸補辛瀉與主氣同苦泄者經曰肺苦氣上逆急食苦以泄之肺本金臟陽明為燥金故治略同金位之主其瀉以辛其補以酸金性收辛則反其性而散之故曰瀉金欲收酸則順其氣而收之故曰補經曰肺欲收急食酸以收之用酸補之辛瀉之卯酉年陽明司天客主之氣無勝無復故陽明之治繫於是年在泉條下太陽司天此以辰戌歲半以上客主之氣有勝無復言也客勝則胸中不利出清涕感寒則咳此言客初氣相火勝客二氣燥金勝客三氣寒水勝也火勝則胸中不利燥勝則鼻中不利寒勝則喉中不利主勝則喉嗌中鳴此言主時木火三氣勝客也主客惟火同氣而火因寒覆故陽氣欲達而喉嗌中作水聲太陽之客以苦補之以咸瀉之以苦堅之以辛潤之苦補咸瀉與主氣同辛潤者經曰腎苦燥急食辛以潤之腎本水臟太陽為寒水故治略同水位之主其瀉以咸其補以苦水性凝咸則反其性而軟之故曰瀉水欲堅苦則順其氣而堅之故曰補經曰腎欲堅急食苦以堅之用苦補之咸瀉之太陽在泉無勝無復故經無治法太陽在泉此以丑未歲半以下客主之氣無勝無復言也寒復內余則腰尻痛屈伸不利股脛足膝中痛此獨不言客主之勝者以水居水位兩不相勝也然以寒水之客而加於土金之主重陰氣盛故寒氣有餘於內也內經運氣病釋六至真要大論篇厥陰之勝此言風木氣勝而土受制也民病耳鳴頭眩憒憒欲吐胃鬲如寒此風木之動木邪傷胃胃虛如寒非真寒也乃水飲也胠脅氣並化而為熱小便黃赤此肝邪盛而化熱侵及小腸也胃脘當心而痛上支兩脅甚則嘔吐鬲咽不通此木勝剋土而胃病也腸鳴飧泄少腹痛注下赤白此以胃大腸皆屬陽明足經病而手經亦病也厥陰之勝治以甘清佐以苦辛以酸瀉之甘為土味清為金氣土金相生則木有制而土不受克矣佐以苦辛苦為火味以生土辛為金味以制木木性條達反其性而斂之故為瀉厥陰之復此言木氣先受金制而既乃復也民病少腹堅滿裡急暴痛此肝邪盛而氣急也厥心痛汗發此肝邪乘胃上陵於心而陽氣泄也嘔吐飲食不入入而復出甚則入脾食痹而吐此脾受肝傷故食入不化或入而氣閉不通吐出乃已也筋骨掉眩清厥此風氣盛而頭目顫運手足逆冷也厥陰之復治以酸寒佐以甘辛以酸瀉之以甘緩之酸為木味寒為水氣木之正味其瀉以酸木火相生宜清以寒也佐以甘辛者木盛土衰以甘補土辛從金化以辛制木也酸瀉甘緩皆木之正味而為正治少陰之勝此言君火氣勝而金受制也民病心下熱善飢臍下反動此以少陰之脈起心中出屬心系下絡小腸而熱乘之也氣遊三焦嘔逆躁煩腹滿痛溏泄傳為赤沃此以熱盛包絡包絡之脈歷絡三焦而上中下俱病也赤沃便血也少陰之勝治以辛寒佐以苦鹹以甘瀉之辛為金味寒為水氣金水相生則火有制而金不傷佐以苦鹹苦從火化以助其辛咸從水化以助其寒也火性急速故以甘緩為瀉少陰之復此言君火先受水制而既乃復也民病燠熱內作煩躁鼽衄嚏嗌燥少腹絞痛分注時止此火炎上而在喉火陷下而居腎大腸分小便之水津而時止時作也氣動於左上行於右咳暴瘖皮膚痛此以肺主音聲外合皮毛而受火之傷也心痛鬱冒不知人乃灑淅惡寒振栗譫妄此心邪自實神明內亂熱極則生寒非真寒也寒已而熱渴而欲飲少氣骨痿隔腸不便浮腫噦噫此寒已而復見真熱也譫妄甚故少氣振栗甚故骨痿陰陽水火不交會於中土故氣阻而外內交病痱疹瘡瘍癰疽痤痔甚則入肺咳而鼻淵此熱甚傷肺不外越於皮毛即內入於肺經也少陰之復治以鹹寒佐以苦辛以甘瀉之以酸收之辛苦發之以咸軟之咸為水味寒為水氣制以其所不勝也佐以苦辛發不遠熱也甘酸以瀉火而斂浮熱苦鹹以散火而解熱結太陰之勝此言濕土氣勝而水受制也民病火氣內郁瘡瘍於中流散於外此以寒濕外甚則心火內郁從中以達於皮膚之外也病在胠脅甚則心痛此謂其瘡瘍在胠脅之皮膚若不流散於外則毒歸於內以心脈出於腋下而起於心中也熱格頭痛喉痹項強此謂熱勝而格於上也獨勝則濕氣內郁寒迫下焦痛留頂互引眉間頭重腰脽重強此謂無熱而濕獨勝也無熱則為寒濕而下與太陽寒水氣合故其所病皆為太陽經脈所行之路胃滿少腹滿內不便善注瀉足下溫足脛胕腫飲發於中胕腫於上此則寒濕合病而滯於中下也飲發則水又於濕合而上行矣太陰之勝治以咸熱佐以辛甘以苦瀉之咸為水味熱為火氣濕熱則以咸化之寒濕則以熱治之濕勝則土寒辛能溫土甘能補土故佐以辛甘若濕勝而土實則以苦瀉之土之正味其瀉以苦也太陰之復此言土氣先受木製而既乃復也民病體重中滿食飲不化此土邪盛而自傷同氣也胸中不便飲發於中咳喘有聲此陰氣上逆脾濕侵肺也頭頂痛重而掉瘈尤甚此濕在三陽筋脈濡軟也嘔而密默唾吐清液此寒濕內動也甚則入腎竅瀉無度此土邪傳腎腎開竅於二陰而門戶不要水泉不藏也太陰之復治以苦熱佐以酸辛以苦瀉之燥之泄之苦為火味熱為火氣苦瀉土熱燥濕也佐以酸辛者惟木生火火不足則佐以酸惟金生水火太過則佐以辛也土位之主其瀉以苦瀉以奪其實燥以勝其濕瀉以利其水也少陽之勝此言相火氣勝而金受制也民病熱客於胃煩心心痛目赤欲嘔嘔酸耳痛此客熱行於上焦故所見病多在上也善飢善驚譫妄此客熱行於中焦而火盛傷陰也少腹痛溺赤下沃赤白此客熱行於下焦也赤白有氣血之分大便曰利小便曰濁少陽之勝治以辛寒佐以甘鹹以甘瀉之辛為金味寒為水氣金水相生則火有制而金不傷佐以甘鹹甘能瀉火咸能泄熱也以甘瀉之者甘能除大熱也少陽之復此言相火先受水制而既乃復也民病驚瘈咳衄心熱煩躁便數憎風此火乘心肺表裡交熱也面如浮埃目乃瞤瘈上為口糜嘔逆血溢血泄此厥氣上行火氣內發故形色變而逼血妄行也發而為瘧惡寒鼓栗嗌絡焦稿渴引水漿少氣脈萎此風火相薄陰陽相併寒極而熱津液涸氣血傷也色變黃赤化而為水傳為胕腫此氣蒸熱化水道不通故溺色變而浮腫如泥也甚則入肺咳而血泄此以火盛剋金而血溢於肺也少陽之復治以鹹冷佐以苦辛以咸軟之以酸收之辛苦發之咸為水味冷為水氣制以所不勝也佐以苦辛發散其熱苦從火化火氣虛則佐以苦辛從金化火氣盛則佐以辛而又必咸軟以解熱之結酸收以斂熱之浮辛苦發之所以申發不遠熱毋犯寒涼之意也當與少陰參看陽明之勝此言燥金氣勝而木受制也民病清發於中左胠脅痛溏泄此金盛木鬱而清邪陷於下也內為嗌塞外發㿗疝此肝木受病而清氣上下行也胸中不便嗌塞而咳此以燥勝則肺氣斂而失其治節也胸中肺之所居陽明之勝治以酸溫佐以辛甘以苦泄之酸為木味溫為火氣木火相生則金有制而木不傷陽明有燥金之氣有清金之氣燥氣而有餘則辛以散之清氣而不足則甘以滋之苦從火化能泄其燥邪也陽明之復此言金氣先受火制而既乃復也民病生胠脅氣歸於左善太息此金氣盛而肝傷則木為之郁肝陽不升膽亦病也甚則心痛否滿腹脹而泄嘔苦咳噦煩心病在鬲中此清氣太過陽明氣逆心胃生寒而皆病也頭痛甚則入肝驚駭筋攣此金氣乘肝也厥陰肝脈上額與督脈會於巔陰明之復治以辛溫佐以苦甘以苦泄之以苦下之以酸補之辛為金味溫為火氣瀉金以辛勝清以溫也苦以制金甘以生金故佐以苦甘而又苦泄以開燥結酸補以斂津液下亦泄也太陽之勝此言寒水氣勝而心受制也民病痔瘧發此以太陽經脈貫臀故痔發以邪正分爭而寒熱互作故瘧發皆寒勝火鬱之病也寒厥入胃內生心痛此寒入胃胃脘當心而痛胃脘在心下故曰心痛陰中乃瘍隱曲不利互引陰股此以太陽之脈絡腎屬膀胱故也筋肉拘苛血脈凝泣絡滿色變或為血泄此筋肉血脈得寒而痹經虛則絡滿血凝則下泄也皮膚否腫腹滿食減此水病之內外分見者也熱反上行頭項囟頂腦戶中痛目如脫寒入下焦傳為濡瀉此水病之上下分見者也太陽之勝治以甘熱佐以辛酸以咸瀉之甘為土味熱為火氣火土相生則水有制而火不散佐以辛酸辛散寒邪之實酸收心氣之傷也水之正味其瀉以咸太陽之復此言水氣先受土製而既乃復也民病心胃生寒胸膈不利心痛否滿此寒在膈間而上下之氣不得通利也頭痛善悲時眩僕食減此寒並於上而陽神虛清陽失守不能熟腐水穀也腰脽反痛屈伸不便此寒歸水臟而太陽經脈自病也少腹控睪引腰脊上衝心此寒客三陰而上侵君火也唾出清水及為噦噫此寒水侮土胃脘無陽也甚則入心善忘善悲此寒甚乘心心藏神而神不足也太陽之復治以咸熱佐以甘辛以苦堅之咸為水味熱為火氣瀉水以咸治寒以熱也佐以甘辛甘以制水辛能散寒也經曰腎欲堅急食苦以堅之內經運氣病釋七至真要大論篇諸風掉眩皆屬於肝此言肝之標為足厥陰而其本風也諸暴強直皆屬於風此言足厥陰肝經之病風氣通於肝也諸痛癢瘡皆屬於心此言心之標為手少陰而其本熱也諸熱瞀瘛皆屬於火此言手少陰心經之病熱氣通於心也心君火也諸濕腫滿皆屬於脾此言脾之標為足太陰而其本濕也諸脹腹大皆屬於熱此言足太陰脾經之病濕氣通於脾而化為熱也諸氣膹郁皆屬於肺此言肺之標為手陰而其本燥也諸病有聲鼓之如鼓皆屬於熱此言手太陰肺經之病諸氣通於肺也有聲者咳喘之類諸寒收引皆屬於腎此言腎之標為足少陰其本寒也諸病水液澄徹清冷皆屬於寒此言足少陰腎經之病寒氣通於腎也諸痙項強皆屬於濕此言足太陽膀胱之病也膀胱為水濕之腑故屬於濕諸躁狂越皆屬於火此言足陽明胃經腑之病也胃經胃腑皆為燥金熱甚則胃陰亡故亦屬火諸嘔吐酸暴注下迫皆屬於熱此言足少陽膽經之病也少陽為相火故屬於熱諸轉反戾水液渾濁皆屬於熱此言手太陽小腸之病也太陽本寒而標則陽故亦屬熱諸病胕腫疼酸驚駭皆屬於火此言手陽明大腸之病也大腸為胃腑經熱入腑遂為火證故屬於火諸痿喘嘔皆屬於上諸厥固泄皆屬於下此言手少陽三焦之病也三焦之氣遊行上下而治必取諸中焦中安而上下皆安也痿屬心肺厥屬肝腎諸禁鼓栗如喪神守皆屬於火此亦三焦之火獨盛於中即陽明所見真熱之病亦即厥陰所見假寒之病所以口噤肢栗似屬於寒而實皆屬於火也諸逆衝上皆屬於火此言手厥陰心包絡之病也心包代君受邪故亦屬火故大要曰謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其地氣令其調達而致和平此之謂也此引古經大要之言以明十九條之病機各有所屬也經何以言有者求之無者求之有無皆以證言人但知有是證之為病而不知無是證之為病或隱伏也故即於有者求之尤當於無者求之也經何以言盛者責之虛者責之盛謂邪已實邪而實不可不知虛謂邪末實邪未實尤不可不知也故既曰盛者責之而又必曰虛者責之也虛曰責之不曰補之謂必審其為實而後可瀉耳辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽六者或收或散或緩或急或燥或潤或軟或堅以所利而行之調其氣使其平也此言十九條之病機總以調之使平為治凡宜發散則用辛甘宜湧泄則用酸苦宜湧泄宜滲泄則用鹹與淡者皆治也皆所以疏其氣使調達而致和平也以見不疏其氣即不調達而不和平也治病之法宜何從乎而謂病機可不審乎經何以於十九條內獨不言燥以燥本屬寒而毗於寒則為寒毗於火即為火易所以謂火就燥也況諸暴強直風亦致燥諸痙項強濕亦化燥燥無定也則凡十九條皆可以求燥也豈是獨遺燥耶內經運氣病釋八陳無擇三因方附子山萸湯病見前氣交篇今不再出此以六甲年太宮運歲土太過雨濕流行土勝木復而民病焉故宜以此方治之附子片炮山茱萸烏梅肉木瓜肉豆蔻薑半夏丁香木香生薑大棗繆問解此方曰敦阜之紀雨濕流行腎中真氣被遏則火之為用不宣脾土轉失溫煦此先後天交病之會也經謂濕淫於內治以苦熱故以附子大熱純陽之品直達坎陽以消陰翳回厥逆而鼓少火治腎而兼治脾但附子性殊走竄必賴維持之力而用始神有如真武湯之於白芍地黃飲之於五味是也此而不佐以萸肉之酸收安必其入腎而無劫液之慮不偕以烏梅之靜鎮難必其歸土而無爍肺之憂得此佐治非徒陽弱者賴以見功即陰虛者亦投之中綮矣然腹滿溏泄為風所復土轉受戕則治肝亦宜急也臟宜補既有萸肉以培乙木腑宜瀉更用木瓜以泄甲木所以安甲乙者即所以資戊己也肉果辛溫助土有止瀉之功兼散皮外絡下諸氣治肉痿所必需再復以半夏之利濕丁木香之治胃木瓜烏梅之療痿生薑大棗之和中眼光四射矣風氣來復有味酸群藥補之瀉之尚何顧慮之有哉陳無擇三因方白朮厚朴湯此以六己年少宮運歲土不及風乃盛行木勝金復而民病焉故宜以此方治之白朮厚朴桂心青皮甘草炙藿香乾薑炮半夏繆問解此方曰歲土不及寒水無畏風乃大行民病飧泄霍亂等證皆土虛所見端但土虛則木必乘之是補太陰必兼泄厥陰也夫脾為陰土所惡者濕所畏者肝其取資則本於胃古人治脾必及胃者恐胃氣不得下降則脾氣不得上升胃不能遊溢精氣脾即無所取資故君以白朮甘苦入脾燥濕即佐以厚朴苦溫平胃理氣是補臟通腑之法也肝為將軍之官乘土不足而陵犯中州是宜泄之桂心辛甘泄肝之氣青皮苦酸泄肝之血辛酸相合足以化肝復以甘草緩肝之急監製過泄之品毋令過侵臟氣再合藿香之辛芬橫入脾絡炮薑之苦辛上行脾經半夏之辛潤下宣脾氣其種種顧慮總不外乎奠安中土使脾氣固密自不畏乎風氣之流行矣金氣來復又得厚朴半夏瀉肺氣之有餘不用苦寒戕土即內經以平為期不可太過之義也是方不用薑棗以脾之氣分受邪無藉大棗入營之品且畏薑之峻補肝陽錦心妙諦豈語言所能推贊哉陳無擇三因方柴菀湯此以六乙年少商運歲金不及炎火乃行火勝水復而民病焉故宜以此方治之紫菀茸桑白皮人參黃耆地骨皮杏仁白芍藥甘草生薑大棗繆問解此方曰凡歲金不及之年補肺即當瀉火以折其炎上之勢若肺金自餒火乘其敝民病肩背痛瞀重鼽嚏便血注下不救其根本可乎哉蓋肩背為雲門中腑之會肺脈所循鼻為肺竅肺傷則鼽嚏肺與大腸為表裡氣不下攝則為便血注下臟病而腑亦病此時惟有清火止泄一法急補肺金斯為得耳紫菀苦溫下氣和血寒熱咸治桑皮甘寒補血益氣吐畜所需而尤賴參耆固無形之氣即以攝走泄之陰也氣交之火必潛伏金中地骨皮甘平微苦能瀉肺中伏火止其血之沸騰又肺苦氣上逆泄之以杏仁之苦肺欲收斂之以白芍之酸合之甘草補土生金薑棗調和營衛緩諸藥於至高之分而參耆得收指臂之功為水所復不用別藥蓋補土可以生金而實土即以御水也陳無擇三因方牛膝木瓜湯此以六庚年太商運歲金太過燥氣流行金勝火復而民病焉故宜以此方治之牛膝木瓜白芍藥杜仲黃松節菟絲子枸杞子天麻生薑大棗甘草繆問解此方曰此治歲金太過肝木受邪之方也夫金性至剛害必陵木民病兩脅與少腹痛目赤痛肩背至胻足皆痛是非肝為金遏鬱而不舒胡上下諸痛悉見耶蓋肝藏血而所畏惟金肺氣逆行不獨上蒙清竅且無以榮養百骸緣見諸痛及其火復陰傷更致氣血交病用藥之例補肝血者可以從酸補肝氣者必不得從辛矣何則酸可育肝之陰辛則劫肝之血也故方用牛膝酸平下達為君木瓜酸溫舒筋為臣而即佐以白芍和厥陰之陰且制肺金之橫杜仲養風木之氣自無辛烈之偏同為氣血交補義仍重取肝陰最為有見至松節利血中之濕且治關節之痛菟絲子入三陰之經專助筋脈之力復以枸杞甘平潤肺合之天麻辛溫息風緊安而木亦平此則柔克之道也顧慮周密雖有火氣來復喘咳氣逆等證亦可無憂矣陳無擇三因方黃連茯苓湯此以六丙年太羽運歲水太過寒氣流行水勝土復而民病焉故宜以此方治之黃連黃芩赤茯苓半夏通草車前子甘草遠志麥冬生薑大棗繆問解此方曰歲水太過寒氣流行邪害心火此而不以辛熱益心之陽何耶按六丙之歲太陽在上澤無陽焰火發待時少陰在上寒熱陵犯氣爭於中少陽在上炎火乃流陰行陽化皆寒盛火鬱之會也故病見身熱煩躁譫妄脛腫腹滿等證種種俱水濕鬱熱見端投以辛熱正速斃耳丙為陽剛之水故宗內經氣寒氣涼治以寒涼立方妙在不理心陽而專利水清熱以黃連之可升可降寒能勝熱者平其上下之熱更以黃芩之可左可右逐水濕清表裡熱者泄其內外之邪茯苓半夏通利陽明通草性輕專療浮腫車前色黑功達水源甘草為九土之精實堤御水使水不上陵於心而心自安也心為君主義不受邪僅以遠志之辛祛其譫妄遊刃有餘心脾道近治以奇法也但苦味皆從火化恐燥則傷其嬌臟故佐以麥冬養液保金且以麥冬合車前可已濕痹具見導水功能土氣來復即借半夏之辛溫以疏土實用藥之妙豈思議所可及哉陳無擇三因方五味子湯此以六辛年少羽運歲水不及濕乃盛行土勝木復而民病焉故宜以此方治之五味子附子片熟地黃巴戟天鹿茸杜仲炒山茱萸生薑鹽繆問解此方曰辛年主病身重濡泄寒瘍足痿清厥等證皆涸流之紀腎虛受濕也然而淡滲逐濕則傷陰風藥勝濕益耗氣二者均犯虛虛之戒矣蓋腎中之陽弱少火乏生化之權則濡泄肌肉失溫煦之運則濕不行因而入氣分則為身重入分血則為寒瘍腎中之陰弱則痿痛而煩冤即內經所稱內舍腰膝外舍溪谷皆濕之為害也故君以五味子之酸收收陰陽二氣於坎中臣以直入坎宮之附子急助腎陽遍走經絡逐陰霾破竹之勢有非他藥可及者再佐以熟地甘苦悅下之味填補腎陰助五味子固護封蟄治腎之法無遺蘊矣巴戟甘溫入陰除痹有效鹿茸鹹溫補血益髓稱神精不足者補之以味是也為木所復目視䀮䀮筋骨痠楚肝虛可知肝欲辛補以杜仲之辛肝喜酸與之以萸肉之酸況二藥並行能除濕痹而利關節補肝即所以益腎又子能令母實之意非獨治其來復也陳無擇三因方蓯蓉牛膝湯此以六丁年少角運歲木不及燥乃盛行金勝火復而民病焉故宜以此方治之蓯蓉熟地黃牛膝當歸白芍藥木瓜甘草烏梅鹿角生薑大棗繆問解此方曰此與六庚年之牛膝湯同為補肝之劑而補之之法大有徑庭矣民病胠脅少腹痛厥陰之經下絡少腹肝虛則陽下陷而為痛木動則風內攻而為腸鳴鶩溏是年風燥火熱多陽少陰不資液以救焚則熇熇之勢遂致燎原是當藉天一之水以制其陽焰者也但腎為肝母徒益其陰則木無氣以升遂失春生之性僅補其陽則木乏水以溉保無隕落之憂故必水火雙調庶合虛則補母之義蓯蓉咸能潤下溫不劫津坎中之陽所必需熟地苦能堅腎潤以滋燥腎中之陰尤有賴陰陽平補不致有偏勝之虞矣合之牛膝酸平達下再復歸芍辛酸化陰直走厥陰之臟血燥可以無憂但為火所復而為寒熱瘡瘍則一從少陽始一從少陰來也木瓜之酸泄少陽甘草之甘瀉少陰烏梅止溏泄鹿角主瘡瘍薑棗和營衛同一補肝而法有不同如此陳無擇三因茯苓湯此以六壬年太角運歲木太過風氣流行木勝金復而民病焉故宜以此方治之白茯苓白朮甘草草果厚朴半夏乾薑炮青皮生薑大棗繆問解此方曰發生之紀風氣流行木旺肝強脾土受邪之會也民病飧泄食減體重煩冤腸鳴腹滿甚則忽忽善怒肝木乘脾極矣是當用肝病實脾法以為根本之地夫風淫所勝治以苦甘而治臟必先通腑故君以茯苓通利脾家之濕而即臣以白朮甘草一苦一甘補脾之體佐以草果厚朴辛香導滯宣脾之用健運不愆臟腑有交賴矣半夏助辛淡之用炮薑資焦苦之功治脾之法已盡乎此而風淫所勝平之宜急加以青皮之酸合之甘草之甘所謂以酸瀉之以甘緩之是也金氣來復脅痛而吐木益病矣瀉之緩之已備具於諸藥之中使以薑棗調營益衛為治中所必需信乎治病之必求於本也陳無擇三因方麥門冬湯此以六戊年太徵運歲火太過炎暑流行火勝水復而民病焉故宜以此方治之麥門冬人參桑白皮紫菀茸半夏甘草白芷竹葉生薑大棗繆問解此方曰歲火太過炎暑流行熱甚則燥肺金受其侮矣民病瘧少氣血溢泄等證肺臟被爍可知此而不陰陽並補則金敗水竭火無所畏多將熇熇矣麥冬養肺之陰人參益肺之氣張潔古謂參味苦甘甘能瀉火麥冬味苦兼泄心陽且救金且抑火一用而兩擅其長肺之欲有不遂者乎然肺為多氣之臟益之而無以開之亦不可也桑皮甘寒紫菀微辛開其膹郁藉以為止血之功再用半夏甘草以益脾土虛則補其母也白芷辛芬能散肺家風熱治脅痛稱神竹葉性升引藥上達補肺之法無餘蘊矣水氣來復實上即可御水又何煩多贅乎要知此方之妙不犯瀉心苦寒之品最為特識蓋歲氣之火屬在氣交與外淫之火有間設用苦寒土氣被戕肺之化源絶矣是方也惟肺脈微弱者可用若沉數有力及浮洪而滑疾者均非所宜此中消息願後賢會之陳無擇三因方黃耆茯神湯此以六癸年少徵運歲火不及寒乃盛行水勝土復而民病焉故宜以此方治之生黃耆茯神紫河車遠志酸棗仁生薑大棗繆問解此方曰六癸之水其臟為心其發為痛揆厥病情無一非心血不足見端蓋心為生血之臟血足則榮養百骸不足則病多傍見如胸脅膺背諸痛甚則屈不能伸而肩臂之絡如青靈少海諸穴咸繫於心則止痛必專補血從可知矣方用黃耆走表止痛於外茯神入心益氣於中而即以河車血肉有情補其心血遠志挈離入坎育其心神藥物無多簡而賅切而當矣土氣來復反侵水臟亦足妨心佐以苡米甘淡悅脾即有治痿之功而又藉以交通心腎蓋嬰兒奼女必媒合於黃婆此治心腎者所以必兼治脾也要之氣交之病多屬臟氣侵陵非如六腑之可瀉即偶用以佐治亦不可以太過天干十方具本此義特為拈出可為世之操刃者頂門下一針矣內經運氣病釋九陳無擇三因方敷和湯病見前六元篇今不再出此以巳亥十年厥陰司天少陽在泉風燥火熱之氣見於氣交而民病焉故宜以此方治之半夏茯苓酸棗仁生甘草炙五味子乾薑炮枳實青皮訶子大棗初之氣陽明加臨厥陰本方加牛蒡子二之氣太陽加臨少陰本方加麥冬山藥三之氣厥陰加臨少陽本方加紫菀四之氣少陰加臨太陰本方加澤瀉五之氣太陰加臨陽明依本方終之氣少陰加臨太陽依本方繆問解此方曰風木主歲經謂熱病行於下風病行於上風燥勝復形於中濕化乃行治宜辛以調其上咸以調其下蓋辛從金化能制厥陰咸從水化能平相火揆厥病機或為寒或為熱或為溫厲病非一端氣原龐雜用藥非具卓識又何從而措手哉此方配合氣味尤妙論其氣則寒熱兼施論其味則辛酸鹹合用有補虛有瀉實其大要不過瀉火平木而已半夏辛能潤下合茯苓之淡滲祛濕除黃棗仁生用能瀉相火甘草炙用能緩厥陰別録載五味子除熱有專功故風在上以甘酸泄之而火在下以鹹溫制之也再加炮薑以溫上年未退之寒枳實以泄本年中之濕青皮訶子協大棗醒胃悅脾無邪不治矣初之氣加牛蒡之辛平導炮薑之辛溫以散寒二之氣病反中熱加麥冬以清金山藥以益土三之氣木邪內肆加紫菀佐金平木四之氣濕熱交甚加澤瀉以逐濕山梔以清濕中之熱五氣終氣並從本方藥味無多絲絲入扣世謂司天板方不可為訓豈其然哉按繆氏於初氣民病寒於右之下解作右脅因謂炮薑能溫右脅之寒此誤也故改之陳無擇三因方正陽湯按陳氏以平氣升陽二字歸諸少陽相火故於少陰君火之年以正陽名其方此以子午十年少陰司天陽明在泉水火寒熱之氣見於氣交而民病焉故宜以此方治之當歸川芎元參旋覆花白薇白芍藥桑白皮甘草生薑初之氣太陽加臨厥陰本方加升麻棗仁二之氣厥陰加臨少陰本方加車前子白茯苓三之氣少陰加臨少陽本方加麻仁杏仁四之氣太陰加臨太陰本方加荊芥茵陳五之氣少陽加臨陽明依本方終之氣陽明加臨太陽本方加蘇子繆問解此方曰少陰司天之歲經謂熱病生於上清病生於下寒熱固結而爭於中病咳喘血溢泄及目赤心痛等證寒熱交爭之歲也夫熱為火性寒屬金體用藥之權當辛溫以和其寒酸苦以泄其熱不致偏寒偏熱斯為得耳君當歸味苦氣溫可升可降止諸血之妄行除咳定痛以補少陰之陰川芎味辛氣溫主一切血治風痰飲發有神功元參味苦鹹色走腎而味入心偕旋覆之咸能軟堅白薇之咸以泄熱者合內經咸以調其上之法也白芍酸苦微寒主邪氣而除血痹偕桑皮之瀉肺火而散瘀血者合內經酸以安其下之義也諸藥既有維持上下之功復加甘草生薑一和一散上熱下清之疾胥蠲矣初之氣加升麻之升清陽酸棗之除煩渴以利其氣鬱氣利則諸痛自止二之氣加車前以明目茯苓以通淋三之氣加麻杏二味一以潤燥一以開肺四之氣加荊芥入木泄火止妄行之血茵陳入土除濕去淤熱之黃陳氏藏器謂荊芥搜肝風治勞渴嗌乾飲發均為專藥五之氣依正方終之氣加蘇子以下氣傳曰剛克柔克真斯道之權衡也陳無擇三因方備化湯此以丑未十年太陰司天太陽在泉濕寒之氣見於氣交而民病焉故宜以此方治之附子片炮生地黃茯苓覆盆子牛膝木瓜生薑甘草初之氣厥陰加臨厥陰依本方二之氣少陰加臨少陰本方去附子加防風天麻三之氣太陰加臨少陽本方加澤瀉四之氣少陽加臨太陰依本方五之氣陽明加臨陽明依本方終之氣太陽加臨太陽依本方繆問解此方曰丑未之歲陰專其令陽氣退避民病腹脹胕腫痞逆拘急其為寒濕合邪可知夫寒則太陽之氣不行濕則太陰之氣不運君以附子大熱之品通行上下逐濕祛寒但陰極則陽為所抑濕中之火亦能逼血上行佐以生地涼沸騰之勢並以制辛烈之雄茯苓覆盆一滲一斂牛膝木瓜通利關節加辛溫之生薑兼疏地黃之膩膈甘溫之甘草並緩附子之妨陰謂非有制之師耶二之氣熱甚於濕故加防風走表以散邪天麻息風以御火三之氣濕甚於熱故加澤瀉以利三焦決瀆之道餘氣並依正方抑其太過扶其不及相時而動按氣以推非深明於陰陽之遞嬗藥餌之功用者烏足以語於斯陳無擇三因方升明湯此以寅申十年少陽司天厥陰在泉風熱之氣見於氣交而民病焉故宜以此方治之酸棗仁生熟各半車前紫檀香薔薇青皮半夏生薑甘草初之氣少陰加臨厥陰本方加白薇元參二之氣太陰加臨少陰本方加丁香三之氣少陽加臨少陽本方加赤芍漏蘆升麻四之氣陽明加臨太陰本方加茯苓五之氣太陽加臨陽明依本方終之氣厥陰加臨太陽本方加五味子繆問解此方曰是歲上為相火下屬風木正民病火淫風勝之會也棗仁味酸平本經稱其治心腹寒熱邪結熟用則補肝陰生用則清膽熱故君之以泄少陽之火佐車前之甘寒以瀉肝家之熱司天在泉一火一風咸賴乎此紫檀為東南間色寒能勝火咸足柔肝又上下維持之聖藥也風木主令害及陽明嘔吐瘧泄俱肝邪犯胃所致薔薇為陽明專藥味苦性冷除風熱而散瘡瘍兼清五臟客熱合之青皮半夏生薑平肝和胃散逆止嘔甘草緩肝之急能瀉諸火平平數藥無微不入理法兼備之方也初之氣加白薇苦鹹以清血分之邪元參苦寒以除氣分之熱二之氣加丁香醒脾止吐三之氣加赤芍之酸寒以清血分之熱漏蘆之鹹寒以清氣分之邪蓋漏蘆能通小腸消熱毒且升麻升散火邪以治目赤四之氣加茯苓利濕泄滿五之氣依正方終之氣加五味子之酸以收之陳無擇三因方審平湯此以卯酉十年陽明司天少陰在泉清熱之氣見於氣交而民病焉故宜以此方治之天門冬山茱萸白芍藥遠志紫檀香白朮生薑甘草初之氣太陰加臨厥陰本方加茯苓半夏紫蘇二初氣少陽加臨少陰本方加白薇元參三之氣陽明加臨少陽本方去萸肉遠志白朮加丹參車前四之氣太陽加臨太陰本方加棗仁車前五之氣厥陰加臨陽明依本方終之氣少陰加臨太陽依本方繆問解此方曰陽明司天少陰在泉民見諸病莫非金燥火烈見端治宜咸與苦與辛咸以抑火辛苦以助金故君以天冬苦平濡潤化燥抑陽古人稱其治血妄行能利小便為肺家專藥有通上徹下之功金不務德則肝必受戕萸肉補肝陽也白芍益肝陰也但火位乎下勢必炎上助燥滋虐為害尤烈妙在遠志辛以益腎能導君火下行紫檀咸以養營且制陽光上僭又佐白朮以致津合生薑以散火甘草潤肺瀉心運氣交賴其配合氣味之妙如此凡水火不調等證有不立愈者哉初之氣加茯半利水和脾紫蘇補中益氣二之氣加白薇之苦鹹以治寒熱元參之苦寒以泄浮火三之氣燥熱相合故去萸肉之酸收遠志之苦泄白朮之香燥加丹參生血和營佐車前益腎導火四之氣加棗仁入心以育神車前入腎以治痿五氣終氣皆不用加減成法可稽而無不可見活法之妙也陳無擇三因方靜順湯此以辰戌十年太陽司天太陰在泉寒濕之氣見於氣交而民病焉故宜以此方治之附子片炮乾薑炮茯苓牛膝甘草防風訶子木瓜初之氣少陽加臨厥陰本方去附子加枸杞二之氣陽明加臨少陰本方仍加附子三之氣太陽加臨少陽本方去薑附木瓜加人參地榆枸杞白芷四之氣厥陰加臨太陰本方加石榴皮五之氣少陰加臨陽明依本方終之氣太陰加臨太陽本方去牛膝加當歸白芍藥阿膠繆問解此方曰太陽司天之歲寒臨太虛陽氣不令正民病寒濕之會也君附子以溫太陽之經臣炮薑以煦太陰之陽茯苓牛膝導附子專達下焦甘草防風引炮薑上行脾土復以訶子酸能醒胃木瓜酸可入脾且賴斂攝肺金恐辛熱之僭上而無制也防風附子皆通行十二經合用之而且表裡寒濕均除矣初之氣風火交煽故去附子之辛熱且加枸杞以養陰二之氣大涼反至故仍加附子以禦寒也三之氣病寒反熱不宜酸溫益火故去薑附木瓜熱傷氣加人參以助氣熱傷血加地榆以涼血再以枸杞養營益陰白芷消散外瘍四之氣風濕交爭加石榴皮甘酸溫澀且治筋骨腰腳攣痛並主注下赤白五之氣無有他害故依正方終之氣一陽內伏津液為傷故去牛膝破血之品而加歸芍入肝以致津阿膠入腎以致液焉
