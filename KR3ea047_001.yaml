body:
  text: 附內經遺篇病釋一卷內經遺篇小引素問不見疫字以刺法本病二篇之遺也六元正紀初終之氣有病溫癘者固即內經之論疫然疫之一字則獨見於刺法本病論中自二篇之遺而疫字遂不見於內經後人之不識何病是疫且競以溫熱病為疫者蓋即因此二篇之遺故耳余於運氣之病既逐篇盡釋之而以此二篇所論五疫之大小相似正與六元紀之遠近咸若互相發明真是論疫之原不可不並為之釋意固不僅為天地五星呆詮升降故不為之表而但論而存之以貽世之欲明疫病非溫熱即可以知溫熱之治必當求諸仲景傷寒之論是則余所望於後之君子矣內經遺篇病釋刺法本病二篇此二篇皆言疫癘之由與六元正紀五郁證相表裡也巳亥年火金二郁證民病伏陽內生煩熱心神驚悸寒熱間作久郁暴熱化作溫癘火疫皆煩而燥渴渴甚治之以泄之可止此巳亥繼辰戌之後厥陰當正太陽之位以司天其間氣少陰君火居辰戌之泉右者必先升巳亥之天左然後司天厥陰得以遷正而火所畏者天蓬水星也勝之則升而不前凡醜卯巳未酉亥六支皆屬陰年即皆不及巳亥以不及之支厥陰未及遷正其昇天左之君火本未當位而又遇辛巳辛亥年干中運並以水勝少陰之火故巳亥支中獨於二辛水乾每見火鬱之證也民皆昏倦夜臥不安咽乾引飲懊熱內煩久而掉眩手足直而不仁兩脅作痛滿目忙忙此巳亥繼辰戌之後厥陰當正太陽之位以司天其間氣陽明燥金居辰戌之天右者必先降巳亥之泉左然後司天厥陰得以遷正而金所畏者地彤火星也勝之則降而不入凡子寅辰午申戌六支皆屬陽年即皆有餘上陽支辰戌司天太陽以有餘而不退位則天右陽明本未當位而又遇癸巳癸亥年干中運並以火勝陽明之金故巳亥支中獨於二癸火干每見金鬱之證也巳亥年太陽不退位則厥陰不遷正民病原闕按是年經文原闕民病而以上年太陽未即退位之義推之當即可以巳亥初氣民病寒於右之下一語補之又病喜怒目系轉轉筋淋溲小便赤按前病是因不退位後病是因不遷正下仿此此以巳亥之年猶行辰戌之令寒氣布天風化不行也子午年土水二郁證民病風厥涎潮偏痹不隨脹滿久而伏郁化疫夭亡臉肢腑黃疸滿閉此子午繼巳亥之後少陰當正厥陰之位以司天其間氣太陰濕土居巳亥之泉右者必先升子午之天左然後司天少陰得以遷正而土所畏者天衝木星也勝之則升而不前凡他子午支火土金水運太陰土均無所畏而惟壬子壬午木運之年剛木干太過之氣先天而至中運之木隨之勝土而巳亥泉右之土斯郁故子午支中獨於二壬木干每見土鬱之證也民病大厥四肢重怠陰痿少力此子午繼巳亥之後少陰當正厥陰之位以司天其間氣太陽寒水居巳亥之天右者必先降子午之泉左然後司天少陰得以遷正而水所畏者地阜土星也勝之則降而不入凡他子午支木火金水之運太陽寒水均無所畏而惟甲子甲午土運之年剛土乾太過之氣先天而至中運之土隨之勝水巳亥天右之水斯郁故子午支中獨於二甲土乾每見水鬱之證也子午年厥陰不退位則少陰不遷正民病溫疫疵廢風生皆肢節痛頭目痛伏熱內煩咽喉干引飲又病寒熱四肢煩痛腰脊強直此以子午之年猶行巳亥之令熱化不行風反為災也丑未年火木二郁證民病伏陽在內煩熱生中心神驚駭寒熱間爭久鬱而化伏熱內煩痹而生厥甚則血溢此丑未繼子午之後太陰當正少陰之位以司天其間氣少陽相火居子午之泉右者必先升丑未之天左然後司天太陰得以遷正而火所畏者天蓬水星也勝之則升而不前凡醜卯巳未酉亥六支皆屬陰年即皆不及丑未以不及之支太陰未及遷正其應昇天左之少陽本未當位而又遇辛丑辛未年干中運並以水勝少陽之火故丑未支中獨於二辛水乾每見火鬱之證也民皆風燥相伏懼清傷臟此丑未繼子午之後太陰當正少陰之位以司天其間氣厥陰風木居子午之天右者必先降丑未之泉左然後司天太陰得以遷正而木所畏者地晶金星也勝之則降而不入凡子寅辰午申戌六支皆屬陽年即皆有餘上陽支子午司天少陰以有餘而不退位則右間厥陰本未當位而又遇乙丑乙未年於中運並以金勝厥陰之木故丑未支中獨於二乙金干每見木鬱之證也丑未年少陰不退位則太陰不遷正民病膈熱咽乾血溢驚駭小便赤澀丹瘤疹瘡瘍留毒又病手足肢節腫滿大腹水腫填臆不食飧泄脅滿四肢不舉此以丑未之年猶行子午之令雨化不行熱氣尚治也寅申年金火二郁證民病上熱喘嗽血溢久鬱而化脅滿悲傷寒鼽嚏嗌乾手拆皮膚燥此以寅申繼丑未之後少陽當正太陰之位以司天其間氣陽明燥金居丑未之泉右者必先升寅申之天左然後司天少陽得以遷正而金所畏者天英火星也勝之則升而不前凡他寅申支木土金水之運陽明金均無所畏而惟戊寅戊申火運之年剛火干太過之氣先天而至中運之火隨之勝金丑未泉右之金斯郁故寅申支中獨於二戊火干每見金鬱之證也民病面赤心煩頭痛目眩溫病欲作此以寅申繼丑未之後少陽當正太陰之位以司天其間氣少陰君火居丑未之天右者必先降寅申之泉左然後司天少陽得以遷正而火所畏者地元水星也勝之則降而不入凡他寅申支木火土金之運少陰火均無所畏而惟丙寅丙申水運之年剛水乾太過之氣先天而至中運之水隨之勝火丑未天右之火斯郁故寅申支中獨於二丙水乾每見火鬱之證也寅申年太陰不退位則少陽不遷正民病四肢少力食飲不下足脛寒陰痿閉塞失溺小便數泄注淋漓又病痎瘧骨熱心悸驚駭甚時血溢此以寅申之年猶行丑未之令火氣不行濕乃布天也卯酉年水土二郁證民病注下食不及化久而成郁厥逆而噦熱生於內氣痹於外足脛痠冷反生心悸懊熱暴煩複厥此以卯酉繼寅申之後陽明當正少陽之位以司天其間氣太陽寒水居寅申之泉右者必先升卯酉之天左然後司天陽明得以遷正而水所畏者天芮土星也勝之則升而不前凡醜卯巳未酉亥六支皆屬陰年即皆不及卯酉以不及之支陽明未及遷正其應昇天左之太陽本未當位而又遇巳卯巳酉年干中運並以土勝太陽之水故卯酉支中獨於二巳土乾每見水鬱之證也民病四肢不舉昏眩肢節痛腹滿填臆此以卯酉繼寅申之後陽明當正少陽之位以司天其間氣太陰濕土居寅申之天右者必先降卯酉之泉左然後司天陽明得以遷正而土所畏者地蒼木星也勝之則降而不入凡子寅辰午申戌六支皆屬陽年即皆有餘上陽支寅申司天少陽以有餘而不退位則右間厥陰本未當位而又遇丁卯丁酉年干中運並以木勝太陰之土故卯酉支中獨於二丁木干每見土鬱之證也卯酉年少陽不退位則陽明不遷正民病少氣寒熱更作便血上熱小腹堅滿小便赤沃甚則血溢又病寒熱鼽嚏皮毛折爪甲枯焦甚則喘嗽息高悲傷不樂此以卯酉之年猶行寅申之令火尚布天金化不行也辰戌年木火二郁證民病溫疫早發咽嗌乾四肢滿肢節皆痛郁久而發卒中偏痹手足不仁此以辰戌繼卯酉之後太陽當正陽明之位以司天其間氣厥陰風木居卯酉之泉右者必先升辰戌之天左然後司天太陽得以遷正而木所畏者天柱金星也勝之則升而不前凡他辰戌支木火土水之運太陽水均無所畏而惟庚辰庚戌金運之年剛金干太過之氣先天而至中運之金隨之勝木卯酉泉右之木斯郁故辰戌支中獨於二庚金干每見木鬱之證也民病面赤心煩頭痛目眩熱病欲作此以辰戌繼卯酉之後太陽當正陽明之位以司天其間氣少陽相火居卯酉之天右者必先降辰戌之泉左然後司天太陽得以遷正而火所畏者地元水星也勝之則降而不入凡他辰戌支木火土金之運少陽火均無所畏而惟丙辰丙戌水運之年剛水乾太過之氣先天而至中運之水隨之勝火卯酉天右之火斯郁故辰戌支中獨於二丙水乾每見火鬱之證也辰戌年陽明不退位則太陽不遷正民病嘔吐暴注食飲不下大便乾燥四肢不舉目瞑掉眩又病溫癘喉閉嗌乾煩躁而渴喘息有音此以辰戌之年猶行卯酉之令燥尚布天寒化不行也按此則內經遺篇所言疫癘者方是後世所謂瘟疫之病特因古無瘟字概作溫字故誤以溫熱病為即瘟疫耳巳亥陰年火欲升而天蓬之水抑之當刺包絡之滎勞宮穴巳亥陰年金欲降而地彤之火窒之當刺心包絡之所出中衝穴手少陽之所入天井穴子午陽年土欲升而天衝之木抑之當刺足太陰之俞太白穴子午陽年水欲降而地阜之土窒之當刺足太陰之所出隱白穴足陽明之所入三里穴丑未陰年火欲升而天蓬之水抑之當刺包絡之滎勞宮穴丑未陰年木欲降而地晶之金窒之當刺手太陰之所出少商穴手陽明之所入曲池穴寅申陽年金欲升而天英之火抑之當刺手太陰之經經渠穴先左後右寅申陽年火欲降而地元之水窒之當刺足少陰之所出湧泉穴足太陽之所入委中穴先左後右卯酉陰年水欲升而天芮之土抑之當刺足少陰之合陰谷穴先左後右卯酉陰年土欲降而地蒼之木窒之當刺足厥陰之所出大敦穴足少陽之所入陽陵泉穴辰戌陽年木欲升而天柱之金抑之當刺足厥陰之井大敦穴辰戌陽年火欲降而地元之水窒之當刺足少陰之所出湧泉穴足太陽之所入委中穴凡天氣之病曰疫地氣之病曰癘疫以氣言癘以形言也凡治升之法木鬱治木金鬱治金治其本經是也凡治降之法當折其所勝如木鬱治金金鬱治火是也凡經言刺法宜在何經即可為藥食之准故並載之木疫解壬與丁合為木運上壬則下丁壬午壬子剛木之年少陰主政其在泉則陽明丁酉丁卯柔木也中運天衝木星抑其上年地右濕土不得升為本年之天左濕土不升則上年司天之厥陰不退位而本年司天之少陰亦不得遷正在下丁木之柔不得上合壬木之剛而反以辛水之司天臨丁木之在泉則上辛下丁不和木運虛金勝木火又復金不獨壬失守丁亦失守後三年化成木疫甚則甲申甲寅微則乙酉乙卯木疫至矣若更遇上年在泉之丙申丙寅不退位則丁酉丁卯柔木之化不正於下有壬無丁剛乾孤立亦為金勝火復三年後必作木癘火疫解戊與癸合為火運上戊則下癸戊申戊寅剛火之年少陽主政其在泉則厥陰癸亥癸巳柔火也中運天英火星抑其上年地右燥金不得升為本年之天左燥金不升則上年司天之太陰不退位而本年司天之少陽亦未得遷正在下癸火之柔不得上合戊火之剛而反以丁木之司天臨癸火之在泉則上丁下癸不和火運虛水勝火土又覆水不獨戊失守癸亦失守後三年化成火疫甚則庚戌庚辰微則辛亥辛巳火疫至矣若更遇上年在泉之壬戌壬辰不退位則癸亥癸巳柔火之化不正於下有戊無癸剛乾孤立亦為水勝土復三年後必作火癘土疫解甲與巳合為土運上甲則下己甲子甲午剛土之年少陰主政其在泉則陽明己卯己酉柔土也中運地阜土星抑其上年天右寒水不得升為本年之地左寒水不降則上年司天之厥陰不退位而本年司天之少陰亦未得遷正在下己土之柔不得上合甲土之剛而反以癸火之司天臨己土之在泉則上癸下己不和土運虛木勝土金又復木不獨甲失守己亦失守後三年化成土疫甚則丙寅丙申微則丁卯丁酉土疫至矣若更遇上年在泉之戊寅戊申不退位則己卯己酉柔土之化不正於下有甲無己剛乾孤立亦為木勝金習三年後必作土癘金疫解庚與乙合為金運上庚則下乙庚辰庚戌剛金之年太陽主政其在泉則太陰乙未乙丑柔金也中運天柱金星抑其上年地右風木不得升為本年之天左風木不升則上年司天之陽明不退位而本年司天之太陽亦未得遷正在下乙金之柔不得上合庚金之剛而反以己土之司天臨乙金之在泉則上己下乙不和金運虛火勝金水又復火不獨庚失守乙亦失守後三年化成金疫甚則壬午壬子微則癸未癸丑金疫至矣若更遇上年在泉之甲午甲子不退位則乙未乙丑柔金之化不正於下有庚無乙剛乾孤立亦為火勝水復三年後必作金癘水疫解丙與辛合為水運上丙則下辛丙寅丙申剛水之年少陽主政其在泉則厥陰辛巳辛亥柔水也中運地元水星抑其上年天右君火不得降為本年之地左君火不降則上年司天之太陰不退位而本年司天之少陽亦未得遷正在下辛水之柔不得上合丙水之剛而反以乙金之司天臨辛水之在泉則上乙下辛不和水運虛土勝水木又復土不獨丙失守辛亦失守後三年化成水疫甚則戊辰戊戌微則己巳己亥水疫至矣若更遇上年在泉之庚辰庚戌不退位則辛巳辛亥柔水之化不正於下有丙無辛剛乾孤立亦為土勝木復三年後必作水癘按內經素問為篇八十有一原有刺法論本病論二篇在六元正紀篇後新校正謂此二篇亡在王氏之前故林億等所見全元起本亦無之則此二篇之散佚固已久矣惟宋元符時劉溫舒謂素問運氣為治病之要而以答問紛糅文辭古奧讀者難知因為論三十篇上於朝末附刺法本病論題曰黃帝內經素問遺篇其篇難未入正本而猶在今道藏中明馬仲化謂不知何代為人竊出私傳不轉賴有此私傳者而尚得別存乎至吳鶴皋又不解此篇本是論疫本不是論尋常溫熱遂目以為誕而譭棄之然考此二篇所言陰陽上下逐年升降民病所由正與運氣七篇大有準對必非後人所能假託余於同治乙丙間亦曾為之釋今特附刊於病釋七篇之後以明欲辨瘟疫者亦甚賴有此二篇也甲申春正月江左下工錄畢並記
